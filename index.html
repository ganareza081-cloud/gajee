<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Scrapbook Kita 💖</title>

<!-- font aesthetic -->
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
body {
  background: #fdf6e3;
  font-family: 'Patrick Hand', cursive;
  text-align: center;
  overflow-x: hidden;
}

h1 {
  margin: 20px;
}

.scrapbook {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.note {
  width: 220px;
  background: white;
  padding: 10px;
  position: relative;
  box-shadow: 5px 8px 15px rgba(0,0,0,0.2);
  cursor: pointer;
}

.note img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.rotate1 { transform: rotate(-5deg); }
.rotate2 { transform: rotate(4deg); }
.rotate3 { transform: rotate(-2deg); }

.tape {
  width: 60px;
  height: 20px;
  background: rgba(255,255,200,0.7);
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%) rotate(-10deg);
}

/* popup */
.popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.popup-content {
  background: white;
  padding: 20px;
  margin: 15% auto;
  width: 300px;
  border-radius: 10px;
}

.close {
  float: right;
  cursor: pointer;
}

/* hati jatuh */
.heart {
  position: fixed;
  top: -10px;
  color: red;
  animation: fall linear;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
</style>

</head>
<body>

<h1>📖 Scrapbook Kita 💕</h1>

<!-- musik -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="scrapbook">

  <div class="note rotate1" onclick="openPopup('Hari pertama kita ketemu 😭💖')">
    <div class="tape"></div>
    <img src="foto1.jpg">
    <p>First Meet 💕</p>
  </div>

  <div class="note rotate2" onclick="openPopup('Kita ketawa terus 😆')">
    <div class="tape"></div>
    <img src="foto2.jpg">
    <p>Best Day 😆</p>
  </div>

  <div class="note rotate3" onclick="openPopup('Aku ga bakal lupa 🤍')">
    <div class="tape"></div>
    <img src="foto3.jpg">
    <p>Unforgettable 🤍</p>
  </div>

</div>

<!-- popup -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span onclick="closePopup()" class="close">&times;</span>
    <p id="popup-text"></p>
  </div>
</div>

<script>
function openPopup(text) {
  document.getElementById("popup").style.display = "block";
  document.getElementById("popup-text").innerText = text;
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

// hati jatuh
setInterval(() => {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 500);
</script>

</body>
</html>
